<!doctype html>
<html lang="es">
  <head>
    <!-- Tipografía -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

    <!-- Manifest PWA -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Colores PWA (empatados con manifest) -->
    <meta name="theme-color" content="#c5f2c7" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Test Vocacional CVP" />

    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />

    <title>Test Vocacional CVP</title>
    <meta name="description" content="Aplicación de Evaluación Vocacional de Club Vida Plena" />
  </head>
    <!-- Rescue Shield: Detects loading failure before React -->
    <style>
      #rescue-shield {
        display: none;
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: white;
        z-index: 9999;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 20px;
        font-family: 'Poppins', sans-serif;
      }
      .rescue-btn {
        background: #1976d2;
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 50px;
        font-weight: 700;
        cursor: pointer;
        margin-top: 20px;
        box-shadow: 0 4px 12px rgba(25, 118, 210, 0.3);
      }
    </style>
    <div id="rescue-shield">
      <h2 style="color: #1e293b;">¿La aplicación no carga?</h2>
      <p style="color: #64748b;">Parece que hay un problema con la memoria del navegador.</p>
      <button class="rescue-btn" onclick="forceReset()">Forzar Reinicio y Limpiar Caché</button>
    </div>
    <script>
      // Si en 6 segundos no se ha quitado el shield (React no cargó), mostrarlo
      var rescueTimeout = setTimeout(function() {
        document.getElementById('rescue-shield').style.display = 'flex';
      }, 6000);

      function forceReset() {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(let registration of registrations) { registration.unregister(); }
          });
        }
        caches.keys().then(function(names) {
          for (let name of names) caches.delete(name);
        });
        localStorage.clear();
        sessionStorage.clear();
        window.location.reload(true);
      }

      // Esta función será llamada desde App.tsx o main.tsx cuando React esté listo
      window.markAppAsReady = function() {
        clearTimeout(rescueTimeout);
        var shield = document.getElementById('rescue-shield');
        if (shield) shield.style.display = 'none';
      };
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
